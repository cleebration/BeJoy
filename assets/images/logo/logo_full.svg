<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Petals -->
  <g opacity="0.92">
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(0 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(45 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(90 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(135 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(180 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(225 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(270 30 30)"/>
    <ellipse cx="30" cy="9"  rx="3.5" ry="7.5" fill="#F5A623" transform="rotate(315 30 30)"/>
  </g>
  <!-- Core circle -->
  <circle cx="30" cy="30" r="13" fill="#1A7A6E"/>
  <!-- B letter -->
  <text x="24" y="36" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#FAF7F2">B</text>
  <!-- Wordmark -->
  <text x="54" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#2C1810" letter-spacing="-0.5">Be</text>
  <text x="82" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#F5A623" letter-spacing="-0.5">Joy</text>
</svg>
